services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
    container_name: pengaduan_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pengaduan_network

  db:
    image: mysql:8.0
    container_name: pengaduan_db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: db_pengaduan_srsk
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pengaduan_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pengaduan_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - pengaduan_network

volumes:
  db_data:

networks:
  pengaduan_network:
    driver: bridge